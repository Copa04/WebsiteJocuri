<h2>Verificare utilizator</h2>
<p>Introduceți numele de utilizator și parola pentru a verifica dacă datele sunt corecte.</p>

<div class="zona-verificare">
    <label for="user_verif">Nume utilizator:</label><br>
    <input type="text" id="user_verif" placeholder="username"><br><br>

    <label for="pass_verif">Parolă:</label><br>
    <input type="password" id="pass_verif" placeholder="parola"><br><br>

    <button type="button" onclick="verificaUtilizator()">Verifică</button>

    <p id="rezultat_verificare"></p>
</div>
